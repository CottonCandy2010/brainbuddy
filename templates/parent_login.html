<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Login - Brain Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/profile-corner-new.js') }}"></script>
    <style>
        .login-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .form-control {
            border-radius: 15px;
            padding: 15px 20px;
            border: 2px solid #e9ecef;
            margin-bottom: 20px;
            font-size: 16px;
        }
        .form-control:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 0.2rem rgba(74, 144, 226, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            padding: 15px 30px;
            font-weight: 600;
            width: 100%;
            font-size: 16px;
        }
        .brain-buddy-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .brain-buddy-logo h2 {
            color: #4a90e2;
            font-weight: 700;
            font-size: 2rem;
            white-space: nowrap;
        }
        @media (max-width: 576px) {
            .brain-buddy-logo h2 {
                font-size: 1.5rem;
            }
        }
        .alert {
            border-radius: 15px;
            border: none;
        }
        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #dee2e6;
        }
        .divider span {
            background: white;
            padding: 0 20px;
            color: #6c757d;
        }
        
        /* Hide profile corner on login page to prevent overlapping */
        .profile-corner {
            display: none !important;
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh;">
    <div class="container">
        <div class="login-container">
            <div class="brain-buddy-logo">
                <img src="{{ url_for('static', filename='images/brain-buddy-logo.png') }}" 
                     alt="Brain Buddy Kids" style="max-width: 120px; height: auto; margin-bottom: 30px;">
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <input type="email" class="form-control" name="email" placeholder="Email Address" required>
                <input type="password" class="form-control" name="password" placeholder="Password" required>
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Sign In to Family Account
                </button>
            </form>

            <div class="divider">
                <span>Don't have an account?</span>
            </div>

            <div class="text-center">
                <a href="{{ url_for('parent_signup') }}" class="btn btn-outline-primary" style="border-radius: 15px; padding: 12px 30px; width: 100%;">
                    <i class="fas fa-user-plus"></i> Create Family Account
                </a>
            </div>

            <div class="text-center mt-4">
                <a href="{{ url_for('index') }}" class="text-muted">
                    <i class="fas fa-arrow-left"></i> Back to Homepage
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
