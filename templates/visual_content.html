// Activity Management - Only counting for now
function showActivity(activityName) {
    if (activityName === 'counting') {
        loadCountingTask(currentTaskIndex);
    }
}

// Counting Tasks Functions
function loadCountingTask(index) {
    const task = countingTasks[index];
    const taskContainer = document.getElementById('countingTask');
    
    let objectsHTML = '';
    for (let i = 0; i < task.count; i++) {
        objectsHTML += `<span class="countable-object" onclick="countObject(this, ${task.count})">${task.objects}</span>`;
    }
    
    taskContainer.innerHTML = `
        <div class="task-question">${task.question}</div>
        <div class="task-objects">${objectsHTML}</div>
        <div class="task-answer">
            <span style="font-size: 1.2em;">I counted:</span>
            <input type="number" class="answer-input" id="answerInput" min="0" max="20" placeholder="?">
            <button class="check-btn" onclick="checkCountingAnswer(${task.count})">Check!</button>
        </div>
        <div class="task-result" id="taskResult"></div>
    `;
    
    // Update progress
    document.getElementById('currentTask').textContent = index + 1;
    document.getElementById('taskProgress').style.width = ((index + 1) / 50 * 100) + '%';
    
    // Update navigation buttons
    document.getElementById('prevBtn').disabled = index === 0;
    document.getElementById('nextBtn').textContent = index === 49 ? 'Complete!' : 'Next →';
}

function countObject(element, correctCount) {
    if (!element.classList.contains('counted')) {
        element.classList.add('counted');
        
        // Update the input field
        const input = document.getElementById('answerInput');
        const currentValue = parseInt(input.value) || 0;
        input.value = currentValue + 1;
        
        // Auto-check if all objects are counted
        const countedObjects = document.querySelectorAll('.countable-object.counted').length;
        if (countedObjects === correctCount) {
            setTimeout(() => checkCountingAnswer(correctCount), 500);
        }
    }
}

function checkCountingAnswer(correctAnswer) {
    const userAnswer = parseInt(document.getElementById('answerInput').value);
    const resultDiv = document.getElementById('taskResult');
    
    if (userAnswer === correctAnswer) {
        resultDiv.innerHTML = `<div style="color: #00b894; font-size: 1.2em; font-weight: bold;">🎉 Correct! You counted ${correctAnswer}!</div>`;
        earnStar();
        
        // Auto-advance after 2 seconds
        setTimeout(() => {
            if (currentTaskIndex < 49) {
                nextTask();
            }
        }, 2000);
    } else {
        resultDiv.innerHTML = `<div style="color: #d63031; font-size: 1.1em;">Try again! Count carefully.</div>`;
    }
}

function nextTask() {
    // Auto-check the current answer first
    const userInput = document.querySelector('#answerInput');
    if (userInput && userInput.value) {
        const userAnswer = parseInt(userInput.value);
        const correctAnswer = countingTasks[currentTaskIndex].count;
        
        if (userAnswer === correctAnswer) {
            earnStar();
            if (currentTaskIndex < 49) {
                currentTaskIndex++;
                loadCountingTask(currentTaskIndex);
                document.getElementById('taskResult').innerHTML = '';
            } else {
                alert('🎉 Congratulations! You completed all 50 counting tasks!');
            }
        } else {
            document.getElementById('taskResult').innerHTML = `<div style="color: #d63031; font-size: 1.1em;">Please count again! The correct answer is ${correctAnswer}.</div>`;
            return;
        }
    } else {
        if (currentTaskIndex < 49) {
            currentTaskIndex++;
            loadCountingTask(currentTaskIndex);
            document.getElementById('taskResult').innerHTML = '';
        } else {
            alert('🎉 Congratulations! You completed all 50 counting tasks!');
        }
    }
}

function previousTask() {
    if (currentTaskIndex > 0) {
        currentTaskIndex--;
        loadCountingTask(currentTaskIndex);
        document.getElementById('taskResult').innerHTML = '';
    }
}

function resetCurrentTask() {
    loadCountingTask(currentTaskIndex);
}

// Shape Game Functions
function exploreShape(shapeName) {
    const shapeInfo = document.getElementById('shapeInfo');
    let info = '';
    
    switch(shapeName) {
        case 'circle':
            info = '🔴 A circle is round like a ball! It has no corners and goes around and around. Can you find circles around you?';
            break;
        case 'square':
            info = '🟦 A square has 4 equal sides and 4 corners! Like a window or a book. All sides are the same length!';
            break;
        case 'triangle':
            info = '🔺 A triangle has 3 sides and 3 corners! Like a slice of pizza or a mountain top!';
            break;
    }
    
    shapeInfo.innerHTML = `<p>${info}</p>`;
    earnStar();
}

        const star = document.getElementById('star' + starsEarned);

        star.style.transform = 'scale(1.2)';
        
        setTimeout(() => {
            star.style.transform = 'scale(1)';
        }, 300);
        
        updateProgress();
    }
}

function updateProgress() {
    const progressText = document.getElementById('progressText');
    if (starsEarned === 1) {
        progressText.textContent = 'Great start! Keep going!';
    } else if (starsEarned === 2) {
        progressText.textContent = 'Amazing! You\'re doing so well!';

}
