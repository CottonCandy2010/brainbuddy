{% extends "layout.html" %}

{% block title %}{{ subject|title }} - {{ topic|title }}{% endblock %}

{% block content %}
<section class="lesson-page animate-fade-in">
    <div class="lesson-header">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1 class="lesson-title">{{ topic|title|replace('-', ' ') }}</h1>
                <p class="lesson-subtitle">{{ subject|title }} - {{ style|title }} Learning</p>
            </div>
            <div class="col-md-4 text-md-end mt-3 mt-md-0">
                <button class="btn btn-primary back-btn" onclick="window.history.back()">
                    <i class="fas fa-arrow-left me-2"></i> Back
                </button>
            </div>
        </div>
    </div>
    
    <div class="content-container">
        <div id="lessonContent">
            <div class="loading-spinner text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading lesson content...</span>
                </div>
                <p class="mt-3">Generating educational content with AI...</p>
            </div>
        </div>
    </div>
</section>

<script>
// Load lesson content using AI generation
document.addEventListener('DOMContentLoaded', function() {
    const subject = '{{ subject }}';
    const topic = '{{ topic }}';
    const style = '{{ style }}';
    
    fetch('/api/generate-lesson-content', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            subject: subject,
            topic: topic,
            style: style
        })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('lessonContent').innerHTML = data.content;
    })
    .catch(error => {
        console.error('Error loading lesson content:', error);
        document.getElementById('lessonContent').innerHTML = `
            <div class="alert alert-warning">
                <h4>Content Loading Issue</h4>
                <p>Unable to load lesson content. Please try refreshing the page.</p>
            </div>
        `;
    });
});
</script>
{% endblock %}
