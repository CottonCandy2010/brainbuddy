<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Family Account - Brain Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/profile-corner-new.js') }}"></script>
    <style>
        .signup-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .form-control {
            border-radius: 15px;
            padding: 12px 18px;
            border: 2px solid #e9ecef;
            margin-bottom: 15px;
        }
        .form-control:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 0.2rem rgba(74, 144, 226, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            padding: 12px 30px;
            font-weight: 600;
            width: 100%;
        }
        .brain-buddy-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .brain-buddy-logo h2 {
            color: #4a90e2;
            font-weight: 700;
            white-space: nowrap;
            font-size: 1.8rem;
        }
        @media (max-width: 576px) {
            .brain-buddy-logo h2 {
                font-size: 1.5rem;
            }
        }
        .alert {
            border-radius: 15px;
            border: none;
        }
        
        /* Hide profile corner on signup page to prevent overlapping */
        .profile-corner {
            display: none !important;
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh;">
    <div class="container">
        <div class="signup-container">
            <div class="brain-buddy-logo">
                <img src="{{ url_for('static', filename='images/brain-buddy-logo.png') }}" 
                     alt="Brain Buddy Kids" style="max-width: 120px; height: auto; margin-bottom: 30px;">
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="row">
                    <div class="col-md-6">
                        <input type="text" class="form-control" name="first_name" placeholder="First Name" required>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control" name="last_name" placeholder="Last Name" required>
                    </div>
                </div>
                
                <input type="email" class="form-control" name="email" placeholder="Email Address" required>
                <input type="password" class="form-control" name="password" placeholder="Create Password" required minlength="6">
                <input type="tel" class="form-control" name="phone" placeholder="Phone Number (Optional)">
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i> Create Family Account
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted">Already have an account?</p>
                <a href="{{ url_for('parent_login') }}" class="btn btn-outline-primary">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
