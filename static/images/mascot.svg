<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Brain Buddy Mascot -->
  
  <!-- Main Brain Shape -->
  <ellipse cx="150" cy="150" rx="120" ry="100" fill="#6c5ce7" stroke="#5a49d1" stroke-width="5"/>
  
  <!-- Brain Texture -->
  <path d="M70,120 C90,100 110,140 130,120 C150,100 170,140 190,120 C210,100 230,140 250,120" 
        fill="none" stroke="#8a7bf0" stroke-width="8" stroke-linecap="round"/>
  <path d="M70,150 C90,130 110,170 130,150 C150,130 170,170 190,150 C210,130 230,170 250,150" 
        fill="none" stroke="#8a7bf0" stroke-width="8" stroke-linecap="round"/>
  <path d="M70,180 C90,160 110,200 130,180 C150,160 170,200 190,180 C210,160 230,200 250,180" 
        fill="none" stroke="#8a7bf0" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Eyes -->
  <circle cx="110" cy="100" r="15" fill="white" stroke="#333" stroke-width="2"/>
  <circle cx="190" cy="100" r="15" fill="white" stroke="#333" stroke-width="2"/>
  <circle cx="110" cy="100" r="7" fill="#333"/>
  <circle cx="190" cy="100" r="7" fill="#333"/>
  
  <!-- Eyebrows -->
  <path d="M95,85 Q110,75 125,85" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <path d="M175,85 Q190,75 205,85" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Cute Smile -->
  <path d="M110,160 Q150,190 190,160" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Rosy Cheeks -->
  <circle cx="90" cy="140" r="10" fill="#ff9999" opacity="0.7"/>
  <circle cx="210" cy="140" r="10" fill="#ff9999" opacity="0.7"/>
  
  <!-- Graduation Cap for Smart Brain -->
  <rect x="110" y="40" width="80" height="10" fill="#333" rx="2"/>
  <path d="M150,50 L110,60 L150,70 L190,60 Z" fill="#333"/>
  <path d="M150,70 L150,85" fill="none" stroke="#333" stroke-width="2"/>
  <rect x="145" y="85" width="10" height="10" fill="#333"/>
  
  <!-- Tiny Book in Hand -->
  <path d="M230,200 L260,220 L260,240 L230,220 Z" fill="#ff6b6b" stroke="#333" stroke-width="2"/>
  <path d="M230,200 L200,220 L200,240 L230,220 Z" fill="#4ecdc4" stroke="#333" stroke-width="2"/>
  <line x1="230" y1="200" x2="230" y2="220" stroke="#333" stroke-width="2"/>
  
  <!-- Small Hand Holding the Book -->
  <path d="M190,210 Q210,215 200,220" fill="#6c5ce7" stroke="#5a49d1" stroke-width="3" stroke-linecap="round"/>
</svg>
